<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            width: 100%;
            max-width: 500px;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            object-fit: cover;
            border: 4px solid #409eff;
        }
        h1 {
            font-size: 28px;
            color: #222;
            margin-bottom: 25px;
        }
        .info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
            color: #555;
            margin: 12px 0;
        }
        .intro {
            margin: 30px 0;
            line-height: 1.8;
            color: #666;
            text-align: left;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        /* 新增板块通用样式 */
        .section {
            margin: 25px 0;
            text-align: left;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #409eff;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 4px solid #409eff;
        }
        .section-content {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            line-height: 1.8;
            color: #555;
        }

        /* 图片合集 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .gallery img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="avatar" src="https://huhussh.github.io/avatar.jpg" alt="头像">
        <h1>尊贵的烧水壶大王</h1>

        <div class="info-item">
            <span>📧</span>
            <span>邮箱：S739773950@gmail.com</span>
        </div>
        <div class="info-item">
            <span>📍</span>
            <span>所在地：上海杨浦</span>
        </div>
        <div class="info-item">
            <span>💬</span>
            <span>微信：S_Jan28h</span>
        </div>

        <div class="intro">
            <strong>个人简介</strong><br>
            十分冷酷的水瓶哥～
        </div>

        <!-- 壶说八道板块 -->
        <div class="section">
            <div class="section-title">💬 壶说八道</div>
            <div class="section-content">
                今天开通自己网站了hhhh～<br>
                我也不知道说什么。<br>
                520快乐 ✨
            </div>
        </div>



    </div>
</body>
</html>
